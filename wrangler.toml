name = "worker-proxy"
main = "src/index.ts"
compatibility_date = "2026-04-22"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

# For local development only. In production, set ANKR_API_KEY via
# Cloudflare Worker secret or via CI (see .github/workflows/deploy.yml).
[vars]
ANKR_API_BASE = "https://rpc.ankr.com/multichain"
